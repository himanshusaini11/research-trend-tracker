name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check app/ tests/

      - name: Mypy
        run: uv run mypy app/ --ignore-missing-imports

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        env:
          POSTGRES_PASSWORD: changeme
          JWT_SECRET: ci-test-secret
        run: uv run pytest tests/ -v --cov=app --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -f infra/docker/Dockerfile -t research-trend-tracker:${{ github.sha }} .

      - name: Verify image starts
        run: |
          docker run --rm \
            -e POSTGRES_PASSWORD=changeme \
            -e JWT_SECRET=ci-test-secret \
            research-trend-tracker:${{ github.sha }} \
            python -c "from app.core.config import settings; print('image OK')"
