# Airflow 3.1.8 — CeleryExecutor with separate Postgres + Redis
# 3.1.8 ships SQLAlchemy 2.0.48 natively — compatible with our app's
# mapped_column / Mapped style ORM models.
# NOTE: 3.0.x shipped SQLAlchemy 1.4.54 and its TaskInstance model used
# legacy annotations that break SQLAlchemy 2.0 strict mode. Use 3.1.x+.
# Ports chosen to avoid conflicts with the app stack:
#   airflow-postgres → 5433  (app postgres on 5432)
#   airflow-redis    → 6380  (app redis   on 6379)

x-airflow-common: &airflow-common
  image: apache/airflow:3.1.8
  env_file:
    - .env
    - .env.params
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://airflow-redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "79GgSWNVflIzO3dofu-0_HQPhMxhQZDOJjDfqOSKGD4="
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__API_SERVER__SECRET_KEY: airflow-dev-secret
    # Shared JWT secret for Task Execution API (scheduler→worker→api-server)
    # Must be the same across all containers — without it each generates a random
    # key, causing "Signature verification failed" when worker calls api-server.
    AIRFLOW__API_AUTH__JWT_SECRET: airflow-dev-execution-jwt-secret
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # Airflow 3.x Task Execution API — workers call back to the api-server
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
    AIRFLOW__SIMPLE_AUTH_MANAGER__PASSWORDS: '{"admin": "admin"}'
    AIRFLOW_CONN_POSTGRES_RTT: postgresql+psycopg2://rtt:changeme@host.docker.internal:5432/rtt
    # RTT app settings — overrides .env.params defaults so containers reach host services
    OLLAMA_URL: http://host.docker.internal:11434
    POSTGRES_HOST: host.docker.internal
    POSTGRES_PORT: "5432"
    POSTGRES_USER: rtt
    POSTGRES_PASSWORD: changeme
    POSTGRES_DB: rtt
    JWT_SECRET: airflow-dev-jwt-secret
    # Make our app package importable
    PYTHONPATH: /opt/airflow
    # Install app deps at container startup (acceptable for dev)
    # sqlalchemy[asyncio] omitted — Airflow 2.10 ships SQLAlchemy 2.x natively
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      pydantic>=2.0
      pydantic-settings>=2.0
      asyncpg>=0.29
      redis>=5.0
      httpx>=0.25
      structlog>=24.0
      psycopg2-binary>=2.9
      greenlet>=3.0
      pgvector>=0.3
      sqlalchemy>=2.0
      networkx>=3.0
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - airflow_logs:/opt/airflow/logs
    - ./app:/opt/airflow/app
  depends_on: &airflow-common-depends-on
    airflow-postgres:
      condition: service_healthy
    airflow-redis:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_logs:
