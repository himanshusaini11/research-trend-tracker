# Airflow 2.10 — CeleryExecutor with separate Postgres + Redis
# 2.10 is required for SQLAlchemy 2.0 support (2.9 ships SQLAlchemy 1.4 which
# conflicts with our app's mapped_column / Mapped style ORM models).
# Ports chosen to avoid conflicts with the app stack:
#   airflow-postgres → 5433  (app postgres on 5432)
#   airflow-redis    → 6380  (app redis   on 6379)

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.0
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://airflow-redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "79GgSWNVflIzO3dofu-0_HQPhMxhQZDOJjDfqOSKGD4="
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__WEBSERVER__SECRET_KEY: airflow-dev-secret
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW_CONN_POSTGRES_RTT: postgresql+psycopg2://rtt:changeme@host.docker.internal:5432/rtt
    # RTT app settings — overrides .env defaults so containers reach host services
    POSTGRES_HOST: host.docker.internal
    POSTGRES_PORT: "5432"
    POSTGRES_USER: rtt
    POSTGRES_PASSWORD: changeme
    POSTGRES_DB: rtt
    JWT_SECRET: airflow-dev-jwt-secret
    # Make our app package importable
    PYTHONPATH: /opt/airflow
    # Install app deps at container startup (acceptable for dev)
    # sqlalchemy[asyncio] omitted — Airflow 2.10 ships SQLAlchemy 2.x natively
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      pydantic>=2.0
      pydantic-settings>=2.0
      asyncpg>=0.29
      redis>=5.0
      httpx>=0.25
      structlog>=24.0
      psycopg2-binary>=2.9
      greenlet>=3.0
      langchain>=0.1
      langchain-ollama>=0.1
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - airflow_logs:/opt/airflow/logs
    - ./app:/opt/airflow/app
  depends_on: &airflow-common-depends-on
    airflow-postgres:
      condition: service_healthy
    airflow-redis:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_logs:
