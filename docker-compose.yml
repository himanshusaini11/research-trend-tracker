services:
  postgres:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.postgres
    shm_size: 256m
    environment:
      POSTGRES_USER: rtt
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: rtt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtt -d rtt"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    env_file:
      - .env
      - .env.params
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  rtt-celery-worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
      - .env.params
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  rtt-celery-beat:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - .env
      - .env.params
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - app

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  uploads_data:
